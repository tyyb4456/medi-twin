server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ── Shared proxy settings ────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ── Agent Proxies ────────────────────────────────────────────────────────
    #   Each /api/<service>/* path is forwarded to the matching container.
    #   Container names match the docker-compose service names.

    # Orchestrator (port 8000)
    location /api/orchestrator/ {
        proxy_pass http://orchestrator:8000/;
    }

    # Patient Context Agent (port 8001)
    location /api/patient-context/ {
        proxy_pass http://patient-context:8001/;
    }

    # Diagnosis Agent (port 8002)
    location /api/diagnosis/ {
        proxy_pass http://diagnosis:8002/;
    }

    # Lab Analysis Agent (port 8003)
    location /api/lab-analysis/ {
        proxy_pass http://lab-analysis:8003/;
    }

    # Drug Safety Agent (port 8004)
    location /api/drug-safety/ {
        proxy_pass http://drug-safety:8004/;
    }

    # Imaging Triage Agent (port 8005)
    location /api/imaging-triage/ {
        proxy_pass http://imaging-triage:8005/;
    }

    # Digital Twin Agent (port 8006)
    location /api/digital-twin/ {
        proxy_pass http://digital-twin:8006/;
    }

    # Explanation Agent (port 8009)
    location /api/explanation/ {
        proxy_pass http://explanation:8009/;
    }

    # Conversative Agent (port 8010)
    location /api/conversative-agent/ {
        proxy_pass http://conversative-agent:8010/;
    }

    # ── SPA fallback — serve index.html for all frontend routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
